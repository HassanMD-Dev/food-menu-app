<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Menu Application</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="assets/icon.jpg" type="jpg/png" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="imageBox">
        <img src="assets/logo.jpg" alt="this is logo" />
      </div>
      <div class="searchBox">
        <input type="text" placeholder="Search Recipe" id="search" />
        <button id="searchBtn">Search</button>
      </div>
      <div class="buttonBox">
        <button class="btn">Add</button>
        <button class="btn">Bookmark</button>
      </div>
    </nav>
    <!-- Loader -->
    <div class="content">
      <div class="loaderContainer">
        <div class="loader"></div>
      </div>
      <!-- Sidebar -->
      <div class="sidebar"></div>
      <!-- Recipe Details -->
      <div class="recipe-details">
        <div class="defaultDetails">
          <div class="defaultContent">
            <h1>🍕 Select a Recipe</h1>

            <p>Choose a recipe to see details</p>
          </div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
